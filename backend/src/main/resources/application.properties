# Application
spring.application.name=ShutterFlow
server.port=8080
server.servlet.context-path=/

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/shutterflow_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:shutterflow_super_secret_key_2024_production_ready}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# AWS S3
aws.access-key=${AWS_ACCESS_KEY:your_aws_access_key}
aws.secret-key=${AWS_SECRET_KEY:your_aws_secret_key}
aws.region=${AWS_REGION:ap-southeast-2}
aws.bucket-name=${AWS_BUCKET_NAME:shutterflow-photos}

# SendGrid
sendgrid.api-key=${SENDGRID_API_KEY:your_sendgrid_key}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@shutterflow.com.au}
sendgrid.from-name=${SENDGRID_FROM_NAME:ShutterFlow}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:your_stripe_secret_key}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:your_webhook_secret}
stripe.currency=${STRIPE_CURRENCY:aud}

# Frontend URL (for CORS)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Actuator Health Check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.com.shutterflow=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n